<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>GlowCheck</title>
    <meta
      name="description"
      content="GlowCheck is a mobile-first skincare ingredient analyzer with saved libraries, stack analysis, and profile tools."
    />
    <meta name="theme-color" content="#fef7ff" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-theme="glow">
    <div id="app"></div>
    <div id="toast-root" aria-live="polite" aria-atomic="true"></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
